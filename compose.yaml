name: memory-graph-agent

# 单容器部署：AI API（内嵌 SQLite 与 ONNX embedding）+ QQ 桥接同在一个镜像里，
# 只需填好 .env 即可启动。
services:
  agent:
    image: ${APP_IMAGE:-ghcr.io/vesperglow/qq-agent:latest}
    build:
      context: .
      args:
        GOPROXY: ${GO_PROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    env_file:
      - .env
    # embedding 权重约 650MB 常驻，稳态总占用 ~1GB；上限兜底 2GB。
    mem_limit: ${MEM_LIMIT:-2g}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-8000}:8000"
      - "${QQ_BOT_BIND_IP:-127.0.0.1}:${QQ_BOT_PORT:-9000}:9000"
    volumes:
      - app_data:/data
      - model_cache:/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=3); urllib.request.urlopen('http://localhost:9000/healthz', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 5
      # 首次启动要下载 embedding 模型（约 640MB），给足冷启动时间。
      start_period: 300s

volumes:
  app_data:
  model_cache:
