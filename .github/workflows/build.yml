name: Build, test and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python and Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install -r app/requirements-dev.txt

      - name: Test Python service
        env:
          PYTHONPATH: ${{ github.workspace }}/app
        run: python -m pytest -q

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: qqbot/go.sum

      - name: Test QQ bridge
        working-directory: qqbot
        run: go test -race ./...

      - name: Vet QQ bridge
        working-directory: qqbot
        run: go vet ./...

      - name: Validate Compose files
        run: |
          cp .env.example .env
          docker compose -f compose.yaml -f compose.gpu.yaml config --quiet

  docker-build:
    name: Build and publish ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: app
            image: git.suzuka-chan.moe/suzuka/qq-agent-app
            build_args: ""
          - service: qqbot
            image: git.suzuka-chan.moe/suzuka/qq-agent-qqbot
            build_args: GOPROXY=https://proxy.golang.org,direct
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to container registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.FORGEJO_TOKEN }}" | docker login git.suzuka-chan.moe -u suzuka --password-stdin

      - name: Build and push image
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          BUILD_ARGS: ${{ matrix.build_args }}
        run: |
          set -euxo pipefail

          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-12)"

          build_args=()
          while IFS= read -r build_arg; do
            [[ -n "$build_arg" ]] && build_args+=(--build-arg "$build_arg")
          done <<< "$BUILD_ARGS"

          docker build \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:sha-$SHORT_SHA" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            --label "org.opencontainers.image.title=QQ Agent ${{ matrix.service }}" \
            "${build_args[@]}" \
            "./${{ matrix.service }}"

          docker images | grep "${{ matrix.service }}" || true

          if [[ "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
            docker push "$IMAGE:latest"
            docker push "$IMAGE:sha-$SHORT_SHA"
          fi
