name: Build, test and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Rust binary
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test --locked

      - name: Release build (mirrors the docker build step)
        run: |
          set -o pipefail
          cargo build --release --locked 2>&1 | tee /tmp/build.log || {
            grep -E "^error" -A6 /tmp/build.log | head -60 | \
              while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          }

      - name: Validate Compose file
        run: |
          cp .env.example .env
          docker compose -f compose.yaml config --quiet

  docker-build:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/vesperglow/mneme:latest
            ghcr.io/vesperglow/mneme:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Mneme
          cache-from: type=gha,scope=rust
          cache-to: type=gha,mode=max,scope=rust
